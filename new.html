<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harness Pro • MAIN-001</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    .drawing {
      width: min(100%, 210mm);
      aspect-ratio: 210 / 297;
      background: #e0f2fe;
      border: 1px solid #334155;
      position: relative;
      overflow: hidden;
      font-family: Arial, sans-serif;
      font-size: 9pt;
      color: #111827;
    }
    .drawing-sheet { position: absolute; inset: 0; }
    .ladder-connector {
      position: absolute;
      top: 14mm;
      width: 12mm;
      height: 86mm;
      border-radius: 2px;
      border: 1px solid #0f172a;
      background: #3fbe73;
    }
    .ladder-band {
      position: absolute;
      top: 13mm;
      height: 90mm;
      border: 1px solid #c49750;
      background: #fef08a;
    }
    .crimp-info {
      font-size: 7.8pt;
      line-height: 1.2;
      text-align: center;
      white-space: nowrap;
    }
    .signal-tag {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 0 2px;
      border: 1px solid #64748b;
      background: #ffffff;
      font-size: 6.8pt;
      line-height: 1.15;
      white-space: nowrap;
    }
    @media print {
      body { background: #ffffff !important; }
      .drawing {
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        border: 1px solid #111827 !important;
        box-shadow: none !important;
      }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-slate-900 border-r border-slate-700 p-6 flex flex-col">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-10 h-10 bg-cyan-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">H</div>
        <div>
          <div class="text-2xl font-semibold tracking-tight">Harness Pro</div>
          <div class="text-xs text-emerald-400">v2.8 • Exact Match</div>
        </div>
      </div>
      <nav class="space-y-1">
        <a href="#" onclick="switchTab(0)" class="flex items-center gap-3 px-4 py-3 bg-slate-800 rounded-2xl text-cyan-400 font-medium"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" onclick="switchTab(1)" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-2xl"><i class="fas fa-table"></i> Pinout Table</a>
        <a href="#" onclick="switchTab(2)" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-2xl"><i class="fas fa-sitemap"></i> Harness Diagram</a>
        <a href="#" onclick="switchTab(3)" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-2xl"><i class="fas fa-file-pdf"></i> Template PDF</a>
        <a href="#" onclick="switchTab(4)" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-2xl"><i class="fas fa-check-circle"></i> Filled Layout</a>
      </nav>
      <div class="mt-auto text-xs text-slate-500">Harness_ID: <span class="font-mono text-emerald-400">MAIN-001</span></div>
    </div>

    <!-- Main -->
    <div class="flex-1 flex flex-col">
      <header class="h-16 border-b border-slate-700 bg-slate-900 px-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <h1 class="text-2xl font-semibold">Wiring Pinout • MAIN-001</h1>
          <span id="rowCount" class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs font-medium rounded-full">Ready</span>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="document.getElementById('excelInput').click()" class="flex items-center gap-2 bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded-2xl text-sm font-medium">
            <i class="fas fa-upload"></i> Load Excel Pinout
          </button>
          <button onclick="document.getElementById('pdfInput').click()" class="flex items-center gap-2 bg-violet-600 hover:bg-violet-500 px-6 py-2 rounded-2xl text-sm font-medium">
            <i class="fas fa-upload"></i> Load Template PDF
          </button>
          <button id="populateBtn" onclick="populateTemplate()" class="hidden flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-2xl text-sm font-medium">
            <i class="fas fa-magic"></i> Populate Into Template
          </button>
          <button onclick="window.print()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-2xl text-sm font-medium">
            <i class="fas fa-print"></i> Print / Save as PDF
          </button>
        </div>
      </header>

      <div class="flex-1 p-8 overflow-auto">
        <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="loadExcel(event)">
        <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="loadPDF(event)">

        <div id="section4" class="hidden p-8">
          <div class="max-w-[210mm] mx-auto">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold text-slate-200">Filled Harness Drawing – Exact Match</h2>
              <button onclick="window.print()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-2xl text-sm">
                <i class="fas fa-print"></i> Print / Save as PDF
              </button>
            </div>
            <div id="filledDrawing" class="drawing mx-auto shadow-2xl"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentData = [];
    let templatePdfUrl = null;

    function loadExcel(e) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        const wb = XLSX.read(ev.target.result, {type: 'array'});
        currentData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        document.getElementById('rowCount').textContent = currentData.length + ' Connections';
        checkPopulateReady();
      };
      reader.readAsArrayBuffer(e.target.files[0]);
    }

    function loadPDF(e) {
      templatePdfUrl = URL.createObjectURL(e.target.files[0]);
      checkPopulateReady();
    }

    function checkPopulateReady() {
      if (currentData.length > 0 && templatePdfUrl) document.getElementById('populateBtn').classList.remove('hidden');
    }

    function populateTemplate() {
      document.getElementById('section4').classList.remove('hidden');
      renderExactDrawing();
    }

    function getWireColor(c) {
      const map = {WHITE: '#ffffff', RED: '#ef4444', BLACK: '#111827', BLUE: '#3b82f6', GREEN: '#22c55e', YELLOW: '#eab308', ORANGE: '#f97316'};
      return map[c ? c.toUpperCase() : 'WHITE'] || '#ffffff';
    }

    function renderExactDrawing() {
      const container = document.getElementById('filledDrawing');
      // Helpers for robust data extraction and safe rendering.
      const escapeHtml = (value) => String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
      const pick = (row, keys) => {
        for (const key of keys) {
          if (row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') return row[key];
        }
        return '';
      };
      const toPin = (value) => {
        const n = parseInt(value, 10);
        return Number.isInteger(n) && n >= 1 && n <= 26 ? n : null;
      };
      const formatAwg = (value) => {
        if (!value && value !== 0) return '';
        const text = String(value).trim();
        return text ? (/AWG/i.test(text) ? text.toUpperCase() : `${text} AWG`) : '';
      };

      // Build a complete 1..26 table so empty rows still appear in the drawing.
      const pinRows = Array.from({length: 26}, (_, index) => ({
        p2: index + 1,
        p4: null,
        signal: '',
        awg: '',
        color: 'WHITE',
        tp: ''
      }));
      currentData.forEach((row) => {
        const p2 = toPin(pick(row, ['P2_Pin', 'P2', 'P2 Pin']));
        const p4 = toPin(pick(row, ['P4_Pin', 'P4', 'P4 Pin']));
        if (!p2) return;
        const target = pinRows[p2 - 1];
        target.p4 = p4;
        target.signal = String(pick(row, ['Signal Name', 'Signal_Name', 'Signal']) || '').trim();
        target.awg = String(pick(row, ['AWG', 'Wire Gauge', 'Gauge']) || '').trim();
        target.color = String(pick(row, ['Color']) || 'WHITE').trim();
        target.tp = String(pick(row, ['TP', 'Test Point']) || '').trim();
      });

      const rightRowsByPin = new Map();
      pinRows.forEach((row) => {
        if (row.p4) rightRowsByPin.set(row.p4, row);
      });

      const notes = [
        'FABRICATION, ASSEMBLY, AND INSPECTION SHALL BE PERFORMED IN ACCORDANCE WITH INTERNAL HARNESS STANDARD MSCP012 AND SHALL COMPLY WITH IPC/WHMA-A-620, CLASS 3, AND IPC-A-610, LATEST REVISION.',
        'CONTINUITY TESTING SHALL BE PERFORMED IN ACCORDANCE WITH IPC/WHMA-A-620 SECTION 19.5, CLASS 3. HIGH-POT TESTING SHALL BE PERFORMED ON THE COMPLETED CABLE ASSEMBLY.',
        'DIMENSIONS ARE IN MILLIMETERS UNLESS OTHERWISE SPECIFIED.',
        'COVER HARNESS BUNDLE WITH EXPANDABLE SLEEVING, ITEM #07, AND SECURE SLEEVE TO BUNDLE WITH FLEECE TESA TAPE, ITEM #06. LEAVE APPROXIMATELY 5-15 MM OF EXPOSED WIRE FROM CONNECTOR ENDS.',
        'FLAG LABELS, ITEM #08, SHALL BE APPLIED IN ACCORDANCE WITH IPC/WHMA-A-620 SECTION 12.7.1 WITHIN 25-76 MM OF THE CONNECTOR HOUSING. REFER TO THE LABEL TABLE FOR LABEL INFORMATION.',
        'REFERENCE INSTRUCTION DOCUMENTS IS-37 AND IS-38 FOR HARWIN GECKO CONNECTORS, ITEM #01.',
        'POTTING MATERIAL SHALL BE LOCTITE STYCAST 2651MM, ITEM #03. EPOXY INGRESS INTO MATING INTERFACES, CONTACTS, OR LATCH FEATURES SHALL BE PREVENTED.',
        'REFER TO "EBOM_10000440-501_A_GB4_TAIL_TO_IOCARRIER" FOR BILL OF MATERIALS.',
        'REFER TO "WIRELIST_10000440-501_A_GB4_TAIL_TO_I0CARRIER" FOR WIRING LIST.'
      ];

      const notesHtml = notes.map((note, idx) => {
        const id = String(idx + 1).padStart(2, '0');
        const icon = idx === 4
          ? '<svg width="11" height="10" viewBox="0 0 11 10" style="margin-right:2px;"><path d="M5.5 0.7 L10.2 9.2 H0.8 Z" fill="none" stroke="#2563eb" stroke-width="1"></path><text x="5.5" y="7.7" text-anchor="middle" font-size="6" fill="#2563eb">!</text></svg>'
          : '';
        return `<div style="display:flex; gap:2.2mm; margin-bottom:1.1mm;">
          <span style="font-weight:700; min-width:6.2mm;">${id}</span>
          <span style="display:flex;">${icon}<span>${escapeHtml(note)}</span></span>
        </div>`;
      }).join('');

      // Ladder coordinates are based on a 1700 x 1180 local viewBox.
      const rowStart = 170;
      const rowPitch = 29;
      const yForPin = (pin) => rowStart + (pin - 1) * rowPitch;

      const ladderRowsSvg = Array.from({length: 26}, (_, i) => {
        const pin = i + 1;
        const left = pinRows[i];
        const right = rightRowsByPin.get(pin) || {};
        const y = yForPin(pin);
        return `
          <line x1="500" y1="${y}" x2="1210" y2="${y}" stroke="#64748b" stroke-width="1.2"/>
          <text x="488" y="${y + 5}" text-anchor="end" fill="#1d4ed8" font-size="17" font-weight="700">${escapeHtml(left.signal)}</text>
          <text x="620" y="${y + 5}" text-anchor="middle" fill="#334155" font-size="15">${escapeHtml(formatAwg(left.awg))}</text>
          <text x="705" y="${y + 5}" text-anchor="middle" fill="#334155" font-size="15">${escapeHtml((left.color || 'WHITE').toUpperCase().slice(0, 3))}</text>
          <text x="785" y="${y + 5}" text-anchor="middle" fill="#334155" font-size="15">${escapeHtml(left.tp)}</text>
          <text x="870" y="${y + 5}" text-anchor="middle" fill="#334155" font-size="15">${left.p4 || ''}</text>
          <text x="1222" y="${y + 5}" text-anchor="start" fill="#1d4ed8" font-size="17" font-weight="700">${escapeHtml(right.signal || '')}</text>
          <text x="396" y="${y + 7}" text-anchor="end" fill="#1e3a8a" font-size="27" font-weight="700">${pin}</text>
          <text x="1316" y="${y + 7}" text-anchor="start" fill="#1e3a8a" font-size="27" font-weight="700">${pin}</text>
        `;
      }).join('');

      const connectedRows = pinRows.filter((row) => row.p4);
      const wirePathsSvg = connectedRows.map((row) => {
        const y1 = yForPin(row.p2);
        const y2 = yForPin(row.p4);
        const bend = Math.max(-85, Math.min(85, (row.p4 - row.p2) * 5));
        return `<path d="M500 ${y1} C ${735 + bend} ${y1} ${975 - bend} ${y2} 1210 ${y2}" stroke="${getWireColor(row.color)}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
      }).join('');

      const signalTags = connectedRows.map((row) => {
        const label = row.signal && row.tp ? `${row.signal} (${row.tp})` : (row.signal || row.tp);
        if (!label) return '';
        const yMid = (yForPin(row.p2) + yForPin(row.p4)) / 2;
        const xJitter = ((row.p2 % 3) - 1) * 4;
        return `<div class="signal-tag" style="left:${(85 + xJitter).toFixed(1)}mm; top:${(yMid / 10).toFixed(2)}mm;">${escapeHtml(label)}</div>`;
      }).join('');

      const dateStamp = new Date().toLocaleDateString('en-US');

      const html = `
        <div class="drawing-sheet">
          <!-- Border + zone grid to mirror engineering template -->
          <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 2100 2970" preserveAspectRatio="none">
            <rect x="22" y="22" width="2056" height="2926" fill="none" stroke="#64748b" stroke-width="2"/>
            <rect x="50" y="50" width="2000" height="2870" fill="none" stroke="#94a3b8" stroke-width="2"/>
            <line x1="50" y1="760" x2="2050" y2="760" stroke="#94a3b8" stroke-width="1.2"/>
            <line x1="50" y1="1500" x2="2050" y2="1500" stroke="#94a3b8" stroke-width="1.2"/>
            <line x1="50" y1="2200" x2="2050" y2="2200" stroke="#94a3b8" stroke-width="1.2"/>
            <text x="150" y="44" font-size="18" fill="#475569">1</text><text x="470" y="44" font-size="18" fill="#475569">2</text><text x="880" y="44" font-size="18" fill="#475569">3</text><text x="1280" y="44" font-size="18" fill="#475569">4</text><text x="1670" y="44" font-size="18" fill="#475569">5</text><text x="1970" y="44" font-size="18" fill="#475569">6</text>
            <text x="150" y="2942" font-size="18" fill="#475569">1</text><text x="470" y="2942" font-size="18" fill="#475569">2</text><text x="880" y="2942" font-size="18" fill="#475569">3</text><text x="1280" y="2942" font-size="18" fill="#475569">4</text><text x="1670" y="2942" font-size="18" fill="#475569">5</text><text x="1970" y="2942" font-size="18" fill="#475569">6</text>
            <text x="30" y="420" font-size="18" fill="#475569">A</text><text x="30" y="1120" font-size="18" fill="#475569">B</text><text x="30" y="1850" font-size="18" fill="#475569">C</text><text x="30" y="2550" font-size="18" fill="#475569">D</text>
            <text x="2060" y="420" font-size="18" fill="#475569">A</text><text x="2060" y="1120" font-size="18" fill="#475569">B</text><text x="2060" y="1850" font-size="18" fill="#475569">C</text><text x="2060" y="2550" font-size="18" fill="#475569">D</text>
          </svg>

          <!-- Top title header -->
          <div style="position:absolute; top:6mm; left:105mm; transform:translateX(-50%); text-align:center; line-height:1.15;">
            <div style="font-size:10.4pt; font-weight:700; letter-spacing:0.02em;">HARNESS, GLIDE B4, TAIL TO I/O CARRIER</div>
            <div style="font-size:8.8pt;">Part Number: 10000440-501 &nbsp;&bull;&nbsp; Rev A &nbsp;&bull;&nbsp; Sheet 1 of 2 &nbsp;&bull;&nbsp; Date: ${dateStamp}</div>
          </div>

          <!-- Notes block -->
          <div style="position:absolute; left:12mm; top:16mm; width:77mm; font-size:7.7pt; line-height:1.2;">
            <div style="color:#1d4ed8; font-weight:700; margin-bottom:1.5mm;">NOTES</div>
            ${notesHtml}
          </div>

          <!-- 500 mm harness overview -->
          <div style="position:absolute; left:78mm; top:82mm; width:102mm; height:34mm;">
            <svg viewBox="0 0 1020 340" class="w-full h-full">
              <defs>
                <marker id="dimArrow500" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
                  <path d="M0,0 L8,4 L0,8 z" fill="#111827"></path>
                </marker>
              </defs>
              <line x1="110" y1="34" x2="910" y2="34" stroke="#111827" stroke-width="1.4" marker-start="url(#dimArrow500)" marker-end="url(#dimArrow500)"></line>
              <line x1="110" y1="20" x2="110" y2="98" stroke="#6b7280" stroke-width="1"></line>
              <line x1="910" y1="20" x2="910" y2="98" stroke="#6b7280" stroke-width="1"></line>
              <text x="510" y="28" text-anchor="middle" fill="#1f2937" font-size="20" font-weight="700">500 MM ± 10 MM</text>
              <rect x="88" y="126" width="32" height="104" fill="#3fbe73" stroke="#111827" stroke-width="1.2"></rect>
              <rect x="900" y="126" width="32" height="104" fill="#3fbe73" stroke="#111827" stroke-width="1.2"></rect>
              <rect x="120" y="166" width="780" height="24" fill="#6b7280" stroke="#4b5563" stroke-width="1.2"></rect>
              <ellipse cx="142" cy="98" rx="36" ry="16" fill="#f5e7c7" stroke="#b58d58" stroke-width="1.2"></ellipse>
              <ellipse cx="886" cy="98" rx="36" ry="16" fill="#f5e7c7" stroke="#b58d58" stroke-width="1.2"></ellipse>
              <ellipse cx="512" cy="126" rx="38" ry="15" fill="#f5e7c7" stroke="#b58d58" stroke-width="1.2"></ellipse>
              <rect x="420" y="124" width="28" height="74" fill="#f8fafc" stroke="#6b7280" stroke-width="1.1"></rect>
              <rect x="576" y="124" width="28" height="74" fill="#f8fafc" stroke="#6b7280" stroke-width="1.1"></rect>
              <text x="62" y="250" text-anchor="middle" fill="#1f2937" font-size="34" font-weight="700">P2</text>
              <text x="958" y="250" text-anchor="middle" fill="#1f2937" font-size="34" font-weight="700">P4</text>
            </svg>
          </div>

          <!-- Label table -->
          <div style="position:absolute; left:103mm; top:112mm; width:47mm; border:1px solid #94a3b8; padding:2.2mm; text-align:center; background:#e2e8f0;">
            <div style="font-weight:700; font-size:9pt; text-decoration:underline; margin-bottom:2mm;">LABEL TABLE</div>
            <div style="display:grid; grid-template-columns:7mm 1fr; border:1px solid #94a3b8; margin-bottom:1.8mm; background:#f8fafc;">
              <div style="border-right:1px solid #94a3b8; font-weight:700; padding:1.1mm 0;">A.</div>
              <div style="padding:1.1mm 0;">P2 (TO TAIL J2)<br>GLI-B4-A01<br>10000440-501</div>
            </div>
            <div style="display:grid; grid-template-columns:7mm 1fr; border:1px solid #94a3b8; background:#f8fafc;">
              <div style="border-right:1px solid #94a3b8; font-weight:700; padding:1.1mm 0;">B.</div>
              <div style="padding:1.1mm 0;">P4 (TO I/O J4)<br>GLI-B4-A01<br>10000440-501</div>
            </div>
          </div>

          <!-- Main ladder diagram -->
          <div style="position:absolute; left:20mm; top:130mm; width:170mm; height:118mm;">
            <div style="position:absolute; left:42mm; top:1mm; color:#1e3a8a; font-size:15pt; font-weight:700;">P2</div>
            <div style="position:absolute; left:41mm; top:8mm; color:#1e3a8a; font-size:9pt; font-weight:700;">TO TAIL (J2)</div>
            <div style="position:absolute; left:118mm; top:1mm; color:#1e3a8a; font-size:15pt; font-weight:700;">P4</div>
            <div style="position:absolute; left:118mm; top:8mm; color:#1e3a8a; font-size:9pt; font-weight:700;">TO I/O CARRIER (J4)</div>

            <div class="ladder-connector" style="left:27mm;"></div>
            <div class="ladder-band" style="left:43mm; width:84mm;"></div>
            <div class="ladder-connector" style="left:131mm;"></div>

            <svg class="absolute inset-0 w-full h-full" viewBox="0 0 1700 1180" preserveAspectRatio="none">
              <text x="64" y="280" fill="#dc2626" font-size="19" font-weight="700">PINS TRIANGLE INDENT</text>
              <line x1="142" y1="294" x2="282" y2="408" stroke="#dc2626" stroke-width="4"></line>
              <polygon points="282,408 272,382 302,396" fill="#dc2626"></polygon>
              <text x="1320" y="280" fill="#dc2626" font-size="19" font-weight="700">PINS TRIANGLE INDENT</text>
              <line x1="1450" y1="294" x2="1392" y2="408" stroke="#dc2626" stroke-width="4"></line>
              <polygon points="1392,408 1382,382 1412,396" fill="#dc2626"></polygon>

              ${ladderRowsSvg}
              ${wirePathsSvg}
            </svg>
            ${signalTags}
          </div>

          <!-- Crimp data blocks -->
          <div class="crimp-info" style="position:absolute; left:24mm; top:214mm;">
            Crimp Contact: GLS-210-0005<br>
            Crimper: Z125-900<br>
            Positioner: Z125-901<br>
            Insert/Remover: Z125-902<br>
            Strip Length: 2.0 mm<br>
            Wire Gauge: 26 AWG
          </div>
          <div class="crimp-info" style="position:absolute; right:24mm; top:214mm;">
            Crimp Contact: GLS-210-0005<br>
            Crimper: Z125-900<br>
            Positioner: Z125-901<br>
            Insert/Remover: Z125-902<br>
            Strip Length: 2.0 mm<br>
            Wire Gauge: 26 AWG
          </div>

          <!-- Bottom title/approval block -->
          <div style="position:absolute; right:8mm; bottom:8mm; width:58mm; border:1px solid #64748b; background:#dce4ef; font-size:7pt;">
            <table style="width:100%; border-collapse:collapse;">
